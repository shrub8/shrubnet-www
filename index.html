<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrubnet Labs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hidden form for Netlify detection -->
    <form name="project-intake" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="tel" name="phone" />
      <input type="text" name="projectTitle" />
      <textarea name="projectDescription"></textarea>
      <input type="text" name="projectType" />
      <textarea name="deliverables"></textarea>
      <input type="text" name="timeline" />
      <textarea name="milestones"></textarea>
      <textarea name="techStack"></textarea>
      <textarea name="integrations"></textarea>
      <input type="text" name="complianceRequirements" />
      <input type="text" name="budgetRange" />
      <textarea name="budgetDetails"></textarea>
      <input type="checkbox" name="hasExistingAssets" />
      <textarea name="assetDescription"></textarea>
      <input type="checkbox" name="requestMNDA" />
      <input type="checkbox" name="mndaSigned" />
    </form>
  </body>
</html>
