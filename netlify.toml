# Netlify config for prerendered SPA
# We commit dist/ with prerendered content, so no build command needed

[build]
  publish = "dist"
  command = "echo 'Using pre-built dist/'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  targetPort = 5173
  publish = "dist"
